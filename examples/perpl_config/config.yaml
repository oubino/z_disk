# filter used during calculation of relative positions
relpos_filter: 150.0

# axial & transverse direction
axial_direction: yy
transverse_direction: xz

# limit between localisations to be included when modelling other direction
# i.e. when modelling axial distances, localisations must be within the 
# transverse limit
transverse_limit: 200. 
axial_limit: 200.

# localisation precision to load in
loc_precision_filter: 5.0

# number of locs per z disk 
numberoflocalisations: [1,5,10]

# sizes of bins for histogram analysis
bin_sizes: [5]

# If defining each model configuration manually, then please ignore below.

# For an exhaustive sweep of all possible models over a given range of parameters
# Please define all possible values of each parameter in lists below
# Then use the gen_sweep_configs.py script to generate the possible models.

# --- axial model params -----
# define all the possible values each parameter can take in a list
axial:
  fitlength: [100] # length of the fit
  dimension: [1] # 1,2,3
  background: [null, linear] # null, flat, linear
  n_peaks: [1] # number of peaks
  # variable amplitude or at a fixed ratio 1, 1 - 1/n, 1 - 2/n
  peak_type: [variable]  # variable, fixed
  # how to model the characteristic distance, either one characteristic distance, 
  # or multiple characteristic distances given by each peak, or multiple peaks 
  # with ratio between them
  charac_dist: [one] # one, multiple_fixed, multiple_ratio
  # ratio between characteristic distances
  charac_dist_ratio: [null] # null or list of ratios e.g. [1.0, 0.7, 0.4] for n_peaks: 3
  # model repeated localisations
  repeats: [True] # True, False
  # include offset
  offset: [False] # True, False
  # normalise the fit
  normalise: [False] # True, False

  # initial guesses at parameters
  params_initial:
    # amplitude of peak 1
    amp_peak_1: 10
    # amplitude of peak 2
    # amp_peak_2: 5
    # etc...
    # first characteristic distance

    characteristic_distance_1: 20
    # second characteristic distance
    # characteristic_distance_2: 5
    # etc.
    # sigma for characteristic distance
    characteristic_distance_broadening: 5
    # standard deviation of localisation precision
    loc_prec_sd: 5
    # amplitude of peak due to repeated localisations
    loc_prec_amp: 10
    # background slope
    bg_slope: -0.2
    # background offset
    bg_offset: 0

  # lower bounds for parameters
  params_lower:
    amp_peak_1: 0
    # amp_peak_2: 0
    # etc...
    characteristic_distance_1: 5
    # characteristic_distance_2: 5
    # etc.
    characteristic_distance_broadening: 0
    loc_prec_sd: 0
    loc_prec_amp: 0
    bg_slope: -10
    bg_offset: 0

  # upper bounds for parameters
  params_upper:
    amp_peak_1: 100
    # amp_peak_2: 100
    # etc...
    characteristic_distance_1: 40
    # characteristic_distance_2: 5
    # etc.
    characteristic_distance_broadening: 10
    loc_prec_sd: 15
    loc_prec_amp: 100
    bg_slope: 20
    bg_offset: 10

# --- transverse model params -----
# define all the possible values each parameter can take in a list
transverse:
  fitlength: [100] # length of the fit
  dimension: [1] # 1,2,3
  background: [null, linear] # null, flat, linear
  n_peaks: [1] # number of peaks
  # variable amplitude or at a fixed ratio 1, 1 - 1/n, 1 - 2/n
  peak_type: [variable]  # variable, fixed
  # how to model the characteristic distance, either one characteristic distance, 
  # or multiple characteristic distances given by each peak, or multiple peaks 
  # with ratio between them
  charac_dist: [one] # one, multiple_fixed, multiple_ratio
  # ratio between characteristic distances
  charac_dist_ratio: [null] # null or list of ratios e.g. [1.0, 0.7, 0.4] for n_peaks: 3
  # model repeated localisations
  repeats: [True] # True, False
  # include offset
  offset: [False] # True, False
  # normalise the fit
  normalise: [False] # True, False

  # initial guesses at parameters
  params_initial:
    # amplitude of peak 1
    amp_peak_1: 10
    # amplitude of peak 2
    # amp_peak_2: 5
    # etc...
    # first characteristic distance

    characteristic_distance_1: 20
    # second characteristic distance
    # characteristic_distance_2: 5
    # etc.
    # sigma for characteristic distance
    characteristic_distance_broadening: 5
    # standard deviation of localisation precision
    loc_prec_sd: 5
    # amplitude of peak due to repeated localisations
    loc_prec_amp: 10
    # background slope
    bg_slope: -0.2
    # background offset
    bg_offset: 0

  # lower bounds for parameters
  params_lower:
    amp_peak_1: 0
    # amp_peak_2: 0
    # etc...
    characteristic_distance_1: 5
    # characteristic_distance_2: 5
    # etc.
    characteristic_distance_broadening: 0
    loc_prec_sd: 0
    loc_prec_amp: 0
    bg_slope: -10
    bg_offset: 0

  # upper bounds for parameters
  params_upper:
    amp_peak_1: 100
    # amp_peak_2: 100
    # etc...
    characteristic_distance_1: 40
    # characteristic_distance_2: 5
    # etc.
    characteristic_distance_broadening: 10
    loc_prec_sd: 15
    loc_prec_amp: 100
    bg_slope: 20
    bg_offset: 10