# fitlength
fitlength: #37

# dimension of the fit
dimension: 2

# how to model the background
# null, flat, linear, linear_flat, trans_bg_0, trans_bg_1, trans_bg_2
background: null

# number of peaks
# 0, 1, 2, ...
n_peaks: 2

# type of peak, either variable amplitude or at a fixed ratio 1, 1 - 1/n, 1 - 2/n
# variable, fixed
peak_type: variable

# how to model the characteristic distance, either one characteristic distance, 
# or multiple characteristic distances given by each peak, or multiple peaks 
# with ratio between them
# one, multiple_fixed, multiple_ratio
characteristic_distance: multiple_fixed

# ratio between characteristic distances
# null or list of ratios e.g. [1.0, 0.7, 0.4] for n_peaks: 3
characteristic_distance_ratio: null

# model repeated localisations i.e. repeated blinking
# True, False
repeats: False

# include an offset turn
# True, False
offset: False

# normalise the fit
normalise: False

# initial guesses at parameters
params_initial:
  # amplitude of peak 1
  amp_peak_1: 10
  # amplitude of peak 2
  amp_peak_2: 10
  # etc...
  # first characteristic distance
  characteristic_distance_1: 13
  # second characteristic distance
  characteristic_distance_2: 25
  # etc.
  # sigma for characteristic distance
  characteristic_distance_broadening: 5
  # standard deviation of localisation precision
  loc_prec_sd: 3
  # amplitude of peak due to repeated localisations
  loc_prec_amp: 10
  # background slope
  bg_slope: -0.2
  # background offset
  bg_offset: 0

# lower bounds for parameters
params_lower:
  amp_peak_1: 0
  amp_peak_2: 0
  # etc...
  characteristic_distance_1: 5
  characteristic_distance_2: 20
  # etc.
  characteristic_distance_broadening: 0
  loc_prec_sd: 0
  loc_prec_amp: 0
  bg_slope: -10
  bg_offset: 0

# upper bounds for parameters
params_upper:
  amp_peak_1: 100
  amp_peak_2: 100
  # etc...
  characteristic_distance_1: 20
  characteristic_distance_2: 40
  # etc.
  characteristic_distance_broadening: 15
  loc_prec_sd: 10
  loc_prec_amp: 100
  bg_slope: 20
  bg_offset: 10
